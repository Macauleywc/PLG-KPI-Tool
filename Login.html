<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLG KPI Portal — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --o:#F47920;--dk:#111;--bg:#F0EEE9;--surface:#fff;
  --border:#E2E0DB;--muted:#888;--font:'Segoe UI',Arial,sans-serif;
}
body{
  font-family:var(--font);background:var(--dk);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* Background texture */
body::before{
  content:'';position:fixed;inset:0;
  background:linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 50%,#0d0d0d 100%);
  z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(
    45deg,transparent,transparent 40px,
    rgba(244,121,32,0.02) 40px,rgba(244,121,32,0.02) 41px
  );
  z-index:0;
}

.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;padding:24px;
}

/* Logo + brand */
.brand{text-align:center;margin-bottom:36px;}
.brand-logo{
  width:220px;height:220px;border-radius:36px;
  background:#ffffff;display:inline-flex;
  align-items:center;justify-content:center;margin-bottom:24px;
  box-shadow:0 14px 56px rgba(0,0,0,0.45);
  border:1px solid rgba(255,255,255,0.08);
}
.brand-logo img{height:150px;width:auto;}
.brand-name{
  font-size:13px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:#888;margin-bottom:6px;
}
.brand-title{
  font-size:24px;font-weight:800;color:#fff;letter-spacing:-.02em;
}
.brand-sub{font-size:13px;color:#555;margin-top:4px;}

/* Card */
.card{
  background:#161616;border:1px solid #222;border-radius:16px;
  padding:32px;box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.card-title{
  font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;
}
.card-sub{font-size:13px;color:#666;margin-bottom:28px;}

/* Form */
.field{margin-bottom:18px;}
.field label{
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:#666;margin-bottom:7px;
}
.field-wrap{position:relative;}
.field input{
  width:100%;background:#1e1e1e;border:1px solid #2a2a2a;
  border-radius:8px;padding:12px 44px 12px 14px;
  font-size:14px;color:#fff;font-family:var(--font);
  transition:border-color .2s;outline:none;
  -webkit-text-security:disc;
}
.field input[type=text]{-webkit-text-security:none;}
.field input::placeholder{color:#444;}
.field input:focus{border-color:var(--o);background:#222;}
.field-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:#444;font-size:16px;cursor:pointer;user-select:none;
  transition:color .2s;
}
.field-icon:hover{color:#888;}

/* Error */
.error-msg{
  display:none;background:#1a0808;border:1px solid #4a1010;
  border-radius:8px;padding:10px 14px;margin-bottom:18px;
  font-size:13px;color:#ef4444;
}
.error-msg.show{display:block;}

/* Button */
.btn-login{
  width:100%;background:var(--o);color:#fff;border:none;
  border-radius:8px;padding:13px;font-size:15px;font-weight:700;
  font-family:var(--font);cursor:pointer;letter-spacing:.01em;
  transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.btn-login:hover{background:#E06810;transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(244,121,32,0.35);}
.btn-login:active{transform:translateY(0);}
.btn-login.loading{background:#555;cursor:not-allowed;transform:none;box-shadow:none;}

/* Footer */
.footer{
  text-align:center;margin-top:24px;
  font-size:12px;color:#444;line-height:1.6;
}
.footer span{color:#333;}

/* Orange accent line */
.accent-bar{
  height:3px;background:var(--o);border-radius:3px 3px 0 0;
  margin:-32px -32px 28px;border-radius:16px 16px 0 0;
}
</style>
</head>

    </div>
    <div class="brand-name">Premier Logistics Group</div>
    <div class="brand-title">KPI Portal</div>
    <div class="brand-sub">Internal reporting tool</div>
  </div>

  <div class="card">
    <div class="accent-bar"></div>
    <div class="card-title">Sign in to continue</div>
    <div class="card-sub">Enter your credentials to access the portal</div>

    <div class="error-msg" id="error-msg">
      Incorrect password. Please try again.
    </div>

    <div class="field">
      <label>Username</label>
      <div class="field-wrap">
        <input type="text" id="username" placeholder="e.g. macauley" autocomplete="username" autocapitalize="none">
        <span class="field-icon">&#128100;</span>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <span class="field-icon" id="toggle-pw" onclick="togglePw()" title="Show/hide">&#128065;</span>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span id="btn-text">Sign in &#8594;</span>
    </button>
  </div>

  <div class="footer">
    <span>Authorised PLG personnel only</span><br>
    Contact your system administrator if you need access
  </div>
</div>

<script>
var HASH = 'b8744063d50e6bd06fef6834943191331b10862a8cbac33f8e0606e68eecac28';

// Allowed users (username -> true, case-insensitive)
// Add/remove names here as needed
var USERS = ['macauley'];

async function sha256(str){
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showError(msg){
  var el = document.getElementById('error-msg');
  el.textContent = msg || 'Incorrect password. Please try again.';
  el.classList.add('show');
}

function clearError(){
  document.getElementById('error-msg').classList.remove('show');
}

function togglePw(){
  var inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function doLogin(){
  clearError();
  var username = document.getElementById('username').value.trim().toLowerCase();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('btn-login');
  var btnText = document.getElementById('btn-text');

  if(!username){ showError('Please enter your username.'); document.getElementById('username').focus(); return; }
  if(!password){ showError('Please enter your password.'); document.getElementById('password').focus(); return; }
  if(!USERS.includes(username)){ showError('Username not recognised. Contact your administrator.'); return; }

  btn.classList.add('loading');
  btnText.textContent = 'Signing in...';

  var hashed = await sha256(password);

  // Small artificial delay for UX
  await new Promise(r => setTimeout(r, 600));

  if(hashed === HASH){
    // Store session (tab-level — expires when browser closes)
    sessionStorage.setItem('plg_auth', btoa(username + ':' + Date.now()));
    btnText.textContent = 'Redirecting...';
    setTimeout(function(){ window.location.href = 'index.html'; }, 300);
  } else {
    btn.classList.remove('loading');
    btnText.textContent = 'Sign in →';
    showError('Incorrect password. Please try again.');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}

// If already authenticated, skip login
if(sessionStorage.getItem('plg_auth')){
  window.location.href = 'index.html';
}
</script>
