<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  if(!sessionStorage.getItem('plg_auth')){
    window.location.href='login.html';
  }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLG KPI Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0; --surface: #FFFFFF; --border: #E4E2DD;
  --text: #18181A; --muted: #6B6865; --faint: #EFEDE8;
  --orange: #F47920; --orange-dim: #FFF0E6; --orange-dk: #E06810;
  --dark: #121212;
  --green: #15803D; --amber: #B45309; --red: #DC2626;
  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow: 0 4px 14px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── Header ── */
.hdr {
  background: var(--dark); height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; border-bottom: 2.5px solid var(--orange);
  position: sticky; top: 0; z-index: 100;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.hdr-logo { height: 22px; width: auto; opacity: 0.88; }
.hdr-divider { width: 1px; height: 18px; background: #2a2a2a; }
.hdr-title { font-size: 13px; font-weight: 600; color: #888; letter-spacing: 0.01em; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.token-wrap {
  display: flex; align-items: center; gap: 8px;
  background: #1c1c1c; border: 1px solid #262626;
  border-radius: 7px; padding: 0 12px; height: 32px; transition: border-color 0.2s;
}
.token-wrap:focus-within { border-color: var(--orange); }
.token-dot { width: 7px; height: 7px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; transition: background 0.2s; }
.token-dot.active { background: #22C55E; }
.token-label { font-size: 10px; font-weight: 700; color: #3e3e3e; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
.token-input { background: none; border: none; color: #bbb; font-size: 12px; font-family: monospace; width: 155px; outline: none; }
.token-input::placeholder { color: #2e2e2e; }
.signout-btn {
  background: none; border: 1px solid #262626; border-radius: 6px;
  color: #5a5a5a; font-size: 12px; font-family: 'Inter', sans-serif;
  padding: 5px 12px; cursor: pointer; transition: all 0.15s;
}
.signout-btn:hover { border-color: #333; color: #aaa; }

/* ── Toolbar ── */
.toolbar-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
.toolbar {
  max-width: 1280px; margin: 0 auto; padding: 12px 28px;
  display: flex; align-items: center; gap: 12px;
}
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 0 12px; height: 36px; transition: border-color 0.15s;
}
.search-wrap:focus-within { border-color: var(--orange); background: var(--surface); }
.search-wrap svg { color: var(--muted); flex-shrink: 0; }
.search-input { border: none; background: none; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--text); width: 220px; outline: none; }
.search-input::placeholder { color: var(--muted); }
.count-badge {
  font-size: 12px; font-weight: 500; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 20px; white-space: nowrap;
}
/* Stat pills — hidden from view but in DOM for JS */
#s-total, #s-data, #s-best, #s-bestname, #s-att { display: none; }
.toolbar-spacer { flex: 1; }
.btn {
  height: 36px; padding: 0 18px; border-radius: 7px; border: none;
  cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
  font-weight: 600; transition: all 0.12s; display: flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-outline { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--faint); color: var(--text); }
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:hover { background: var(--orange-dk); }

/* ── Grid ── */
.grid-wrap { max-width: 1280px; margin: 0 auto 60px; padding: 20px 28px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

/* ── Customer cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  cursor: pointer; transition: box-shadow 0.15s, transform 0.15s;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column; min-height: 160px;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--border); transition: background 0.18s;
}
.card.card--good::before  { background: var(--green); }
.card.card--warn::before  { background: var(--amber); }
.card.card--bad::before   { background: var(--red); }
.card:not(.has-data):hover::before { background: var(--orange); }
.card.card--good:hover::before { background: #166534; }
.card.card--warn:hover::before { background: #92400E; }
.card.card--bad::before   { background: var(--red); }
.card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.edit-mode .card { cursor: default; }
.edit-mode .card:hover { transform: none; box-shadow: var(--shadow-sm); }
.card-head {
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  background: var(--orange-dim); color: var(--orange);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; margin-top: 1px;
}
.card-name {
  flex: 1; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4;
}
.del-btn {
  width: 26px; height: 26px; flex-shrink: 0; border-radius: 6px;
  background: var(--faint); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 13px;
  display: none; align-items: center; justify-content: center; transition: all 0.15s;
}
.del-btn:hover { background: #FEF2F2; border-color: #FCA5A5; color: var(--red); }
.edit-mode .del-btn { display: flex; }
.card-kpi { margin-top: auto; }
.kpi-big { font-size: 34px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
.kpi-big.good { color: var(--green); }
.kpi-big.warn { color: var(--amber); }
.kpi-big.bad  { color: var(--red); }
.kpi-big-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 9px; }
.otif-track { height: 4px; background: var(--faint); border-radius: 2px; overflow: hidden; margin-bottom: 9px; }
.otif-fill { height: 100%; border-radius: 2px; }
.kpi-months { font-size: 11px; color: var(--muted); font-weight: 500; }
.card-no-data { font-size: 12px; color: var(--muted); margin-top: auto; padding-top: 8px; }
.add-card {
  background: transparent; border: 1.5px dashed var(--border);
  border-radius: var(--radius); display: flex; flex-direction: column;
  align-items: center; justify-content: center; min-height: 160px;
  cursor: pointer; transition: all 0.15s;
}
.add-card:hover { border-color: var(--orange); background: var(--orange-dim); }
.add-icon { font-size: 24px; color: #d0cec9; margin-bottom: 7px; transition: color 0.15s; }
.add-card:hover .add-icon { color: var(--orange); }
.add-lbl { font-size: 12px; font-weight: 500; color: var(--muted); }
.empty-state { text-align: center; padding: 60px 0; }
.empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.empty-state-sub { font-size: 13px; color: var(--muted); }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200;
}
.modal {
  background: var(--surface); border-radius: 12px;
  padding: 28px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.modal-input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg);
  outline: none; margin-bottom: 14px; transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--orange); background: var(--surface); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
footer { text-align: center; padding: 18px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>

<script>
var OWNER = 'Macauleywc', REPO = 'PLG-KPI-Tool';
var DEFAULTS = ['Anand International','Bonnington Plastics','BPW','Charles Bentley','Christmas Tree','Drivers Pickles','Geodis','Greiner Bio One','Mediq','Monro','Red Monkey','SAF Holland','SAM Mouldings','Sarstedt','Tom Chambers','VPK'];
var editMode = false, meta = {};

// Global navigation function - called from inline onclick on cards
window.goTo = function(name) {
  window.location.href = 'customer.html?c=' + encodeURIComponent(name);
};

function saveToken() {
  var t = document.getElementById('gh-token').value;
  localStorage.setItem('plg_gh_token', t);
  document.getElementById('tok-dot').classList.toggle('active', t.length > 4);
}
function getToken() { return localStorage.getItem('plg_gh_token') || ''; }
function slug(n) { return n.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }
function inits(n) { return n.split(' ').map(function(w) { return w[0] || ''; }).slice(0, 2).join('').toUpperCase(); }
function getList() {
  try { var a = JSON.parse(localStorage.getItem('plg_customers')); if (Array.isArray(a) && a.length > 0) return a; } catch(e) {}
  saveList(DEFAULTS.slice()); return DEFAULTS.slice();
}
function saveList(a) { localStorage.setItem('plg_customers', JSON.stringify(a)); }
function otifClass(v) { if (v == null) return ''; return parseFloat(v) >= 98 ? 'good' : parseFloat(v) >= 95 ? 'warn' : 'bad'; }

function delCustomer(name) {
  if (!confirm('Remove ' + name + ' from the portal?')) return;
  var l = getList().filter(function(c) { return c !== name; });
  saveList(l); delete meta[name]; render();
}

function render() {
  var list = getList();
  var q = (document.getElementById('search').value || '').toLowerCase();
  var filtered = q ? list.filter(function(n) { return n.toLowerCase().indexOf(q) >= 0; }) : list.slice();
  filtered.sort(function(a,b){ return a.localeCompare(b); });

  document.getElementById('s-total').textContent = list.length;
  document.getElementById('count-badge').textContent = filtered.length + ' customer' + (filtered.length !== 1 ? 's' : '');

  var withData = 0, bestOTIF = null, bestName = '', att = 0;
  list.forEach(function(n) {
    var m = meta[n];
    if (m && m.months > 0) {
      withData++;
      if (m.otif != null) {
        if (bestOTIF === null || parseFloat(m.otif) > parseFloat(bestOTIF)) { bestOTIF = m.otif; bestName = n; }
        if (parseFloat(m.otif) < 95) att++;
      }
    }
  });
  document.getElementById('s-data').textContent = withData;
  document.getElementById('s-best').textContent = bestOTIF != null ? bestOTIF + '%' : '--';
  document.getElementById('s-bestname').textContent = bestName || 'No data yet';
  document.getElementById('s-att').textContent = att;

  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = 'grid' + (editMode ? ' edit-mode' : '');

  if (filtered.length === 0 && q) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">&#128269;</div><div class="empty-state-title">No customers found</div><div class="empty-state-sub">Try a different search term</div></div>';
    return;
  }

  filtered.forEach(function(name) {
    var m = meta[name] || {};
    var hasData = m.months > 0;
    var safeName = name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

    var otifV = m.otif != null ? parseFloat(m.otif) : null;
    var barW = otifV != null ? Math.min(otifV, 100).toFixed(1) : 0;
    var barC = otifV != null ? (otifV >= 98 ? '#15803D' : otifV >= 95 ? '#B45309' : '#DC2626') : '#ccc';
    var statusClass = hasData && otifV != null ? (otifV >= 98 ? ' card--good' : otifV >= 95 ? ' card--warn' : ' card--bad') : '';

    var kpiHtml = hasData
      ? '<div class="card-kpi">'
          + '<div class="kpi-big ' + otifClass(m.otif) + '">' + (otifV != null ? otifV.toFixed(1) + '%' : '\u2014') + '</div>'
          + '<div class="kpi-big-lbl">Pallet OTIF</div>'
          + '<div class="otif-track"><div class="otif-fill" style="width:' + barW + '%;background:' + barC + '"></div></div>'
          + '<div class="kpi-months">' + m.months + ' month' + (m.months !== 1 ? 's' : '') + ' of data</div>'
          + '</div>'
      : '<div class="card-no-data">No data saved yet</div>';

    var onclickAttr = editMode ? '' : ' onclick="goTo(\'' + safeName + '\')"';
    var delBtnHtml = editMode ? '<button class="del-btn" onclick="event.stopPropagation();delCustomer(\'' + safeName + '\')">&#215;</button>' : '';

    var html = '<div class="card' + (hasData ? ' has-data' : '') + statusClass + '"' + onclickAttr + '>'
      + '<div class="card-head">'
      + '<div class="avatar">' + inits(name) + '</div>'
      + '<div class="card-name">' + name + '</div>'
      + delBtnHtml
      + '</div>'
      + kpiHtml
      + '</div>';

    grid.insertAdjacentHTML('beforeend', html);
  });

  if (!editMode) {
    grid.insertAdjacentHTML('beforeend', '<div class="add-card" onclick="showModal()"><div class="add-icon">+</div><div class="add-lbl">Add customer</div></div>');
  }
}

async function loadMeta() {
  var token = getToken(); if (!token) return;
  await Promise.all(getList().map(async function(name) {
    try {
      var r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/data/' + slug(name) + '.json',
        { headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' } });
      if (!r.ok) return;
      var j = await r.json();
      var raw = j.content.replace(/\s/g, '');
      var d = JSON.parse(atob(raw));
      var months = Object.keys(d.months || {}).sort();
      var otif = null, totPlt = 0, totLatePlt = 0, hasPlt = false;
      months.forEach(function(k) {
        var mo = d.months[k]; if (!mo) return;
        totPlt += mo.pallets || 0;
        if (mo.latePallets != null) { totLatePlt += mo.latePallets || 0; hasPlt = true; }
        else if (mo.timeliness != null && mo.pallets) { totLatePlt += Math.round((mo.pallets || 0) * (1 - (mo.timeliness || 0))); hasPlt = true; }
      });
      if (hasPlt && totPlt > 0) otif = ((totPlt - totLatePlt) / totPlt * 100).toFixed(1);
      meta[name] = { months: months.length, otif: otif };
    } catch(e) {}
  }));
  render();
}

function toggleEdit() { editMode = !editMode; document.getElementById('edit-btn').textContent = editMode ? 'Done' : 'Manage'; render(); }
function showModal() { document.getElementById('overlay').style.display = 'flex'; setTimeout(function() { document.getElementById('modal-input').focus(); }, 50); }
function hideModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal-input').value = ''; }
function addCustomer() {
  var name = document.getElementById('modal-input').value.trim(); if (!name) return;
  var l = getList(); if (l.indexOf(name) === -1) { l.push(name); saveList(l); }
  var l2=getList();l2.sort(function(a,b){return a.localeCompare(b);});saveList(l2);
    hideModal(); render(); if (getToken()) loadMeta();
}

window.addEventListener('load', function() {
  var stored = null;
  try { stored = JSON.parse(localStorage.getItem('plg_customers')); } catch(e) {}
  if (!Array.isArray(stored) || stored.length === 0) { localStorage.setItem('plg_customers', JSON.stringify(DEFAULTS)); }
  var t = localStorage.getItem('plg_gh_token');
  if (t) { document.getElementById('gh-token').value = t; document.getElementById('tok-dot').classList.add('active'); }
  render();
  if (t) loadMeta();
});
</script>
</body>
