<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier Logistics Group — KPI Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
header{background:#1a1a1a;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{font-size:18px;font-weight:700;color:#F47920;letter-spacing:0.05em;}
.logo span{color:#fff;font-weight:400;font-size:13px;margin-left:12px;letter-spacing:0.08em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.gh-token-wrap{display:flex;align-items:center;gap:8px;}
.gh-token-wrap label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.06em;}
.gh-token-wrap input{background:#2a2a2a;border:1px solid #444;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;width:200px;}
main{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem;}
.page-title{font-size:24px;font-weight:700;margin-bottom:0.25rem;}
.page-sub{font-size:14px;color:#888;margin-bottom:2rem;}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.toolbar-left{font-size:13px;color:#666;}
.btn{padding:0.55rem 1.2rem;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity 0.15s,transform 0.1s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:#F47920;color:#fff;}
.btn-primary:hover{opacity:0.9;}
.btn-outline{background:#fff;color:#1a1a1a;border:1.5px solid #ddd;}
.btn-outline:hover{background:#f5f5f3;}
.btn-danger{background:#fff;color:#c62828;border:1.5px solid #f5c6c6;}
.btn-danger:hover{background:#fff5f5;}
.customer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.customer-card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:1.5rem;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s;position:relative;text-decoration:none;display:block;}
.customer-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);transform:translateY(-2px);}
.customer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:#F47920;border-radius:12px 12px 0 0;}
.card-icon{width:44px;height:44px;background:#fff3e0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:1rem;}
.card-name{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.card-meta{font-size:12px;color:#aaa;}
.card-otif{font-size:22px;font-weight:700;color:#F47920;margin-top:8px;}
.card-otif-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;}
.card-delete{position:absolute;top:12px;right:12px;width:24px;height:24px;background:#fff;border:1px solid #eee;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#c62828;}
.edit-mode .card-delete{display:flex;}
.edit-mode .customer-card{cursor:default;}
.edit-mode .customer-card:hover{box-shadow:none;transform:none;}
.add-card{background:#fafafa;border:1.5px dashed #ddd;border-radius:12px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;min-height:160px;}
.add-card:hover{border-color:#F47920;background:#fff8f3;}
.add-card-icon{font-size:28px;color:#ddd;margin-bottom:8px;}
.add-card-label{font-size:13px;color:#aaa;font-weight:500;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:#fff;border-radius:12px;padding:2rem;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1rem;}
.modal input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:1rem;}
.modal input:focus{outline:none;border-color:#F47920;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.empty-state{text-align:center;padding:4rem 2rem;color:#aaa;}
.empty-state .e-icon{font-size:48px;margin-bottom:1rem;}
.empty-state p{font-size:14px;}
.status-bar{background:#e8f5e9;border:0.5px solid #a5d6a7;border-radius:8px;padding:10px 14px;font-size:12px;color:#1b5e20;margin-bottom:1.5rem;display:none;}
footer{text-align:center;padding:2rem;font-size:12px;color:#aaa;margin-top:2rem;}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">Premier Logistics Group <span>KPI Portal</span></div>
  </div>
  <div class="header-right">
    <div class="gh-token-wrap">
      <label>GitHub Token</label>
      <input type="password" id="gh-token" placeholder="ghp_..." oninput="saveToken()" autocomplete="off">
    </div>
  </div>
</header>

<main>
  <div class="page-title">Customer KPI Dashboard</div>
  <div class="page-sub">Select a customer to view and update their KPI data, or add a new customer.</div>

  <div id="status-bar" class="status-bar"></div>

  <div class="toolbar">
    <div class="toolbar-left" id="customer-count"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" id="btn-edit" onclick="toggleEdit()">Manage customers</button>
      <button class="btn btn-primary" onclick="showAddModal()">+ Add customer</button>
    </div>
  </div>

  <div class="customer-grid" id="customer-grid"></div>
</main>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>Add customer</h2>
    <input type="text" id="modal-input" placeholder="Customer name e.g. Anand International" onkeydown="if(event.key==='Enter')confirmAdd()">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAdd()">Add customer</button>
    </div>
  </div>
</div>

<footer>Premier Logistics Group &middot; KPI Portal &middot; Data stored securely on GitHub</footer>

<script>
var GH_OWNER='Macauleywc',GH_REPO='PLG-KPI-Tool',GH_BRANCH='main';
var editMode=false;
var customersMeta={};

var DEFAULT_CUSTOMERS=['Anand International','Bonnington Plastics','BPW','Charles Bentley','Christmas Tree','Drivers Pickles','Geodis','Greiner Bio One','Mediq','Monro','Red Monkey','SAF Holland','SAM Mouldings','Sarstedt','Tom Chambers','VPK'];

function saveToken(){localStorage.setItem('plg_gh_token',document.getElementById('gh-token').value);}
function getToken(){return document.getElementById('gh-token').value.trim();}
function slug(name){return name.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');}
function ghFile(name){return'data/'+slug(name)+'.json';}

function getCustomers(){
  try{var c=JSON.parse(localStorage.getItem('plg_customers'));if(Array.isArray(c)&&c.length>0)return c;}catch(e){}
  saveCustomers(DEFAULT_CUSTOMERS);return DEFAULT_CUSTOMERS.slice();
}
function saveCustomers(list){localStorage.setItem('plg_customers',JSON.stringify(list));}

function renderGrid(){
  var customers=getCustomers();
  var grid=document.getElementById('customer-grid');
  document.getElementById('customer-count').textContent=customers.length+' customer'+(customers.length!==1?'s':'');
  if(customers.length===0){
    grid.innerHTML='<div class="empty-state"><div class="e-icon">📁</div><p>No customers yet.<br>Click &ldquo;Add customer&rdquo; to get started.</p></div>';
    return;
  }
  grid.innerHTML='';
  customers.forEach(function(name){
    var meta=customersMeta[name]||{};
    var card=document.createElement('div');
    card.className='customer-card'+(editMode?' edit-mode-card':'');
    var otifHtml=meta.otif!=null?'<div class="card-otif-label">Latest OTIF</div><div class="card-otif">'+meta.otif+'%</div>':'<div class="card-meta" style="margin-top:8px">No data yet</div>';
    var monthsHtml=meta.months?'<div class="card-meta">'+meta.months+' month'+(meta.months!==1?'s':'')+' of data</div>':'';
    card.innerHTML='<div class="card-delete" onclick="deleteCustomer(\''+name.replace(/'/g,"\\'")+'\')" title="Remove">&#x2715;</div>'+
      '<div class="card-icon">📦</div>'+
      '<div class="card-name">'+name+'</div>'+
      monthsHtml+otifHtml;
    if(!editMode){card.onclick=function(){openCustomer(name);};}
    grid.appendChild(card);
  });
  if(editMode){
    grid.classList.add('edit-mode');
  } else {
    grid.classList.remove('edit-mode');
    var addCard=document.createElement('div');
    addCard.className='add-card';
    addCard.onclick=showAddModal;
    addCard.innerHTML='<div class="add-card-icon">+</div><div class="add-card-label">Add customer</div>';
    grid.appendChild(addCard);
  }
}

async function loadCustomerMeta(){
  var token=getToken();if(!token)return;
  var customers=getCustomers();
  await Promise.all(customers.map(async function(name){
    try{
      var url='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+ghFile(name);
      var resp=await fetch(url,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
      if(!resp.ok)return;
      var json=await resp.json();
      var data=JSON.parse(atob(json.content.replace(/\n/g,'')));
      var months=Object.keys(data.months||{});
      var latestKey=months.sort().pop();
      var latestOTIF=null;
      if(latestKey&&data.months[latestKey]){
        var m=data.months[latestKey];
        if(m.timeliness!=null)latestOTIF=(m.timeliness*100).toFixed(1);
      }
      customersMeta[name]={months:months.length,otif:latestOTIF,lastUpdated:data.lastUpdated};
    }catch(e){}
  }));
  renderGrid();
}

function openCustomer(name){
  window.location.href='customer.html?c='+encodeURIComponent(name);
}

function toggleEdit(){
  editMode=!editMode;
  document.getElementById('btn-edit').textContent=editMode?'Done managing':'Manage customers';
  renderGrid();
}

function deleteCustomer(name){
  if(!confirm('Remove '+name+' from the portal? Their GitHub data will not be deleted.'))return;
  var list=getCustomers().filter(function(c){return c!==name;});
  saveCustomers(list);
  delete customersMeta[name];
  renderGrid();
}

function showAddModal(){document.getElementById('modal').style.display='flex';setTimeout(function(){document.getElementById('modal-input').focus();},50);}
function hideModal(){document.getElementById('modal').style.display='none';document.getElementById('modal-input').value='';}
function confirmAdd(){
  var name=document.getElementById('modal-input').value.trim();
  if(!name)return;
  var list=getCustomers();
  if(list.indexOf(name)===-1){list.push(name);saveCustomers(list);}
  hideModal();renderGrid();
  if(getToken())loadCustomerMeta();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)hideModal();});

window.addEventListener('load',function(){
  var t=localStorage.getItem('plg_gh_token');
  if(t)document.getElementById('gh-token').value=t;
  renderGrid();
  if(t)loadCustomerMeta();
});
</script>
</body>
</html>
