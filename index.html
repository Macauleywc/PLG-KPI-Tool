<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLG — KPI Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;
  --surface:#FFFFFF;
  --border:#E5E3DE;
  --text:#1C1C1C;
  --muted:#8A8780;
  --orange:#F47920;
  --orange-light:#FEF0E7;
  --dark:#111111;
  --green:#1A6B3C;
  --amber:#B45309;
  --red:#B91C1C;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{
  background:var(--dark);
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:2px solid var(--orange);
  position:sticky;top:0;z-index:100;
}
.header-logo img{height:28px;width:auto;display:block;}
.header-right{display:flex;align-items:center;gap:10px;}
.token-field{
  display:flex;align-items:center;gap:8px;
  background:#1E1E1E;border:1px solid #333;
  border-radius:6px;padding:0 10px;height:32px;
}
.token-field label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;font-weight:500;}
.token-field input{background:none;border:none;color:#fff;font-size:11px;font-family:'DM Mono',monospace;width:160px;outline:none;}
.token-field input::placeholder{color:#444;}
.token-dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0;transition:background 0.2s;}
.token-dot.on{background:var(--orange);}

/* HERO */
.hero{padding:40px 24px 28px;max-width:1200px;margin:0 auto;}
.hero-title{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;}
.hero-sub{font-size:14px;color:var(--muted);}

/* STATS STRIP */
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border-radius:var(--radius);overflow:hidden;
  margin:20px 0;border:1px solid var(--border);
}
.stat-item{
  background:var(--surface);padding:16px 20px;
}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:700;color:var(--text);}
.stat-value.orange{color:var(--orange);}

/* TOOLBAR */
.toolbar{
  max-width:1200px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.toolbar-left{display:flex;align-items:center;gap:10px;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:0 12px;height:36px;
  transition:border-color 0.15s;
}
.search-box:focus-within{border-color:var(--orange);}
.search-box svg{color:var(--muted);flex-shrink:0;}
.search-box input{border:none;background:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);width:200px;outline:none;}
.search-box input::placeholder{color:var(--muted);}
.count-pill{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.toolbar-right{display:flex;gap:8px;}
.btn{
  height:36px;padding:0 16px;border-radius:var(--radius);border:none;
  cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:all 0.15s;
}
.btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:#E06818;}

/* GRID */
.grid{
  max-width:1200px;margin:0 auto;
  padding:0 24px 48px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:12px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  cursor:pointer;transition:all 0.18s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--border);transition:background 0.2s;
}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.card:hover::before,.card.live::before{background:var(--orange);}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.card-avatar{
  width:38px;height:38px;border-radius:8px;
  background:var(--orange-light);color:var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;letter-spacing:0.02em;
}
.del-btn{
  width:24px;height:24px;border-radius:6px;background:var(--bg);
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  font-size:11px;display:none;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.del-btn:hover{background:#FEF2F2;border-color:#FCA5A5;color:var(--red);}
.edit-mode .del-btn{display:flex;}
.edit-mode .card{cursor:default;}
.edit-mode .card:hover{transform:none;box-shadow:none;}
.card-name{font-size:14px;font-weight:600;margin-bottom:2px;color:var(--text);}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:12px;}
.card-kpis{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding-top:12px;border-top:1px solid var(--border);
}
.kpi-item .kpi-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:2px;}
.kpi-item .kpi-v{font-size:15px;font-weight:700;}
.kpi-v.good{color:var(--green);}
.kpi-v.warn{color:var(--amber);}
.kpi-v.bad{color:var(--red);}
.kpi-v.orange{color:var(--orange);}
.no-data{font-size:12px;color:var(--muted);padding-top:12px;border-top:1px solid var(--border);}
.add-card{
  background:transparent;border:1.5px dashed var(--border);
  border-radius:var(--radius);padding:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:152px;cursor:pointer;transition:all 0.18s;
}
.add-card:hover{border-color:var(--orange);background:var(--orange-light);}
.add-icon{font-size:20px;color:var(--border);margin-bottom:6px;transition:color 0.15s;}
.add-card:hover .add-icon{color:var(--orange);}
.add-label{font-size:12px;color:var(--muted);font-weight:500;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:var(--surface);border-radius:14px;padding:28px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--text);background:var(--bg);outline:none;margin-bottom:14px;
  transition:border-color 0.15s;
}
.modal-input:focus{border-color:var(--orange);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;}

footer{text-align:center;padding:24px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);}
</style>
</head>

<script>
var OWNER='Macauleywc',REPO='PLG-KPI-Tool',BRANCH='main';
var DEFAULTS=['Anand International','Bonnington Plastics','BPW','Charles Bentley','Christmas Tree','Drivers Pickles','Geodis','Greiner Bio One','Mediq','Monro','Red Monkey','SAF Holland','SAM Mouldings','Sarstedt','Tom Chambers','VPK'];
var editMode=false,meta={};

function saveToken(){
  var t=document.getElementById('gh-token').value;
  localStorage.setItem('plg_gh_token',t);
  document.getElementById('tok-dot').classList.toggle('on',t.length>0);
}
function getToken(){return localStorage.getItem('plg_gh_token')||'';}
function slug(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function ghFile(n){return'data/'+slug(n)+'.json';}
function inits(n){return n.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();}
function getList(){try{var a=JSON.parse(localStorage.getItem('plg_customers'));if(Array.isArray(a)&&a.length>0)return a;}catch(e){}return DEFAULTS.slice();}
function saveList(a){localStorage.setItem('plg_customers',JSON.stringify(a));}
function otifClass(v){if(v==null)return'';return parseFloat(v)>=98?'good':parseFloat(v)>=95?'warn':'bad';}

function render(){
  var list=getList();
  var q=(document.getElementById('search').value||'').toLowerCase();
  var filtered=q?list.filter(function(n){return n.toLowerCase().indexOf(q)>=0;}):list.slice();
  document.getElementById('s-total').textContent=list.length;
  document.getElementById('count-pill').textContent=filtered.length+' customer'+(filtered.length!==1?'s':'');
  var withData=0,bestOTIF=null,bestName='',att=0;
  list.forEach(function(n){var m=meta[n];if(m&&m.months>0){withData++;if(m.otif!=null){if(bestOTIF===null||parseFloat(m.otif)>parseFloat(bestOTIF)){bestOTIF=m.otif;bestName=n;}if(parseFloat(m.otif)<95)att++;}}});
  document.getElementById('s-data').textContent=withData;
  document.getElementById('s-best').textContent=bestOTIF!=null?bestOTIF+'%':'—';
  document.getElementById('s-bestname').textContent=bestName||'No data yet';
  document.getElementById('s-att').textContent=att;
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.className='grid'+(editMode?' edit-mode':'');
  filtered.forEach(function(name){
    var m=meta[name]||{};
    var card=document.createElement('div');
    card.className='card'+(m.months>0?' live':'');
    var kpiHtml=m.months>0?
      '<div class="card-kpis">'+
        '<div class="kpi-item"><div class="kpi-l">OTIF</div><div class="kpi-v '+otifClass(m.otif)+'">'+(m.otif!=null?m.otif+'%':'—')+'</div></div>'+
        '<div class="kpi-item"><div class="kpi-l">Months</div><div class="kpi-v orange">'+m.months+'</div></div>'+
      '</div>':
      '<div class="no-data">No data yet</div>';
    card.innerHTML=
      '<div class="card-head">'+
        '<div class="card-avatar">'+inits(name)+'</div>'+
        '<button class="del-btn" onclick="event.stopPropagation();del(''+name.replace(/'/g,"\'")+'')">&#215;</button>'+
      '</div>'+
      '<div class="card-name">'+name+'</div>'+
      (m.months>0?'<div class="card-meta">'+m.months+' month'+(m.months!==1?'s':'')+' of data</div>':'<div class="card-meta">No data yet</div>')+
      kpiHtml;
    if(!editMode)card.onclick=function(){location.href='customer.html?c='+encodeURIComponent(name);};
    grid.appendChild(card);
  });
  if(!editMode){
    var add=document.createElement('div');add.className='add-card';add.onclick=showModal;
    add.innerHTML='<div class="add-icon">+</div><div class="add-label">Add customer</div>';
    grid.appendChild(add);
  }
}

async function loadMeta(){
  var token=getToken();if(!token)return;
  await Promise.all(getList().map(async function(name){
    try{
      var r=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+ghFile(name),{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
      if(!r.ok)return;
      var j=await r.json();
      var d=JSON.parse(atob(j.content.replace(/
/g,'')));
      var months=Object.keys(d.months||{}).sort();
      var latest=months[months.length-1];
      var otif=null;
      if(latest&&d.months[latest]&&d.months[latest].timeliness!=null)otif=(d.months[latest].timeliness*100).toFixed(1);
      meta[name]={months:months.length,otif:otif};
    }catch(e){}
  }));
  render();
}

function toggleEdit(){editMode=!editMode;document.getElementById('edit-btn').textContent=editMode?'Done':'Manage';render();}
function del(name){if(!confirm('Remove '+name+'?'))return;var l=getList().filter(function(c){return c!==name;});saveList(l);delete meta[name];render();}
function showModal(){document.getElementById('overlay').style.display='flex';setTimeout(function(){document.getElementById('modal-input').focus();},50);}
function hideModal(){document.getElementById('overlay').style.display='none';document.getElementById('modal-input').value='';}
function addCustomer(){
  var name=document.getElementById('modal-input').value.trim();if(!name)return;
  var l=getList();if(l.indexOf(name)===-1){l.push(name);saveList(l);}
  hideModal();render();if(getToken())loadMeta();
}

window.addEventListener('load',function(){
  var t=localStorage.getItem('plg_gh_token');
  if(t){document.getElementById('gh-token').value=t;document.getElementById('tok-dot').classList.add('on');}
  render();if(t)loadMeta();
});
</script>
